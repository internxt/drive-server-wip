name: Run e2e tests
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment:
      name: development
    env:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDGRID_MODE_SANDBOX: true
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup environment
        uses: hoverkraft-tech/compose-action@b716db5b717cb9b81e391fe638e5aceaa2299e43
        with:
          compose-file: './infrastructure/docker-compose.yml'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run e2e tests
        run: npm run migrate:test && npm run db:seed:test:all && npm run test:e2e
