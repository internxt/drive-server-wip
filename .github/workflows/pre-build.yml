name: Pre build ( Health check )
on:
    push:
        branches:
          - 'master'
          - 'develop'
    pull_request:
        branches:
          - 'master'
          - 'develop'
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Build
              run: npm run build
